[build]
  command = "npm install"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "nft"
  included_files = ["views/**", "public/**"]
  timeout = 30

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
