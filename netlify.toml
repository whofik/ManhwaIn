[build]
  command = "npm install"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[functions]]
  name = "server"
  node_bundler = "nft"
  included_files = ["views/**", "public/**", "node_modules/ejs/**"]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = true
